<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JRA 宿敌网络可视化</title>
</head>
<body>
<div id="control-panel">
    <button id="collapsePanel" class="collapse-btn" title="隐藏控制面板">
        <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
    </button>
    
    <h3>网络密度控制</h3>

    <label for="weightSlider">最小同场交手次数: <span id="weightValue">2</span></label>
    <input type="range" id="weightSlider" min="1" max="10" value="2" step="1">

    <label for="prizeSlider" style="margin-top: 15px;">最低生涯奖金: <span id="prizeValue"
                                                                           style="color: #ffd700;">0</span>
        万日元</label>
    <input type="range" id="prizeSlider" min="0" max="100000" value="0" step="1000">

    <label for="rankSlider" style="margin-top: 15px;">G1最低名次: 前<span id="rankValue"
                                                                          style="color: #2b6cb0; font-weight: 700;">不限</span></label>
    <input type="range" id="rankSlider" min="1" max="18" value="18" step="1">
    <small style="font-size: 11px; color: #718096; display: block; margin-top: 2px;">18 = 包含所有完赛马匹</small>

    <div class="toggle-container" style="margin-top: 10px;">
        <input type="checkbox" id="strictRankToggle" checked>
        <label for="strictRankToggle"
               style="display: inline; margin-left: 5px; cursor: pointer;">严格模式（同场都达标才连线）</label>
    </div>

    <div class="toggle-container" style="margin-top: 20px;">
        <input type="checkbox" id="showLabelsToggle" checked>
        <label for="showLabelsToggle"
               style="display: inline; margin-left: 5px; cursor: pointer;">始终显示所有马名</label>
    </div>

    <div class="toggle-container" style="margin-top: 15px;">
        <input type="checkbox" id="yearLayoutToggle">
        <label for="yearLayoutToggle"
               style="display: inline; margin-left: 5px; cursor: pointer;">按年份布局（旧→新 = 左→右）</label>
    </div>

    <p class="hint">滑动以重新向数据库发起请求</p>
</div>

<!-- FAB 浮动按钮（默认隐藏） -->
<button id="fabToggle" class="fab-toggle" title="显示控制面板">
    <svg viewBox="0 0 24 24" width="24" height="24">
        <path fill="currentColor" d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm21-1h-2V6h-2V4h-2V2h-2v2h2v2h2v2h2v2zm-4 13h2v-2h-2v2zM3 21h18v-2H3v2z"/>
    </svg>
</button>
<div id="tooltip" class="tooltip"></div>
<div id="app"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
